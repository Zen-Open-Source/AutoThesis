<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}AutoThesis.finance{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script>
      (function() {
        var theme = localStorage.getItem('theme');
        if (theme) {
          document.documentElement.setAttribute('data-theme', theme);
        }
      })();
    </script>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-row">
        <div class="header-left">
          <a class="brand" href="/">AutoThesis.finance</a>
          <p class="tagline">Iterative stock research with inspectable evidence and critiques.</p>
        </div>
        <div class="header-right">
          <nav class="header-nav">
            <a href="/">Runs</a>
            <a href="/comparisons">Comparisons</a>
            <a href="/batches">Batches</a>
            <a href="/templates">Templates</a>
            <a href="/bookmarks">Bookmarks</a>
          </nav>
          <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
            <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
            <svg id="moon-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
          </button>
        </div>
      </div>
    </header>
    <main class="container">
      {% block content %}{% endblock %}
    </main>
    <script>
      (function() {
        var toggle = document.getElementById('theme-toggle');
        var sunIcon = document.getElementById('sun-icon');
        var moonIcon = document.getElementById('moon-icon');

        function getTheme() {
          return document.documentElement.getAttribute('data-theme') ||
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        }

        function setTheme(theme) {
          document.documentElement.setAttribute('data-theme', theme);
          localStorage.setItem('theme', theme);
          updateIcons(theme);
        }

        function updateIcons(theme) {
          if (theme === 'dark') {
            sunIcon.classList.remove('hidden');
            moonIcon.classList.add('hidden');
          } else {
            sunIcon.classList.add('hidden');
            moonIcon.classList.remove('hidden');
          }
        }

        updateIcons(getTheme());

        toggle.addEventListener('click', function() {
          var current = getTheme();
          setTheme(current === 'dark' ? 'light' : 'dark');
        });
      })();
    </script>
  </body>
</html>
